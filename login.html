<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TapingTrading</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lato', sans-serif; background: #FAFAFA; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 30px; font-family: 'Playfair Display', serif; }
    .login-logo span:first-child { font-size: 28px; font-weight: 700; color: #1A1A1A; }
    .login-logo span:last-child { font-size: 28px; color: #C9A962; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
    .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: border-color 0.3s; }
    .form-group input:focus { outline: none; border-color: #C9A962; }
    
    .btn { width: 100%; padding: 14px; background: #1A1A1A; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
    .btn:hover { background: #333; }
    .btn.secondary { background: transparent; color: #1A1A1A; border: 1px solid #1A1A1A; margin-top: 10px; }
    .btn.secondary:hover { background: #f5f5f5; }
    
    .error { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    .success { color: #27ae60; font-size: 13px; margin-top: 10px; display: none; }
    
    .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #999; border-bottom: 2px solid transparent; }
    .tab.active { color: #1A1A1A; border-bottom-color: #C9A962; }
    
    .hidden { display: none; }
    .user-info { text-align: center; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
    .user-info .email { color: #1A1A1A; font-weight: 600; }
    .user-info .role { color: #C9A962; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <span>TAPING</span><span>TRADING</span>
    </div>
    
    <!-- 登录表单 -->
    <div id="login-form">
      <div class="tabs">
        <div class="tab active" onclick="showTab('login')">登录</div>
        <div class="tab" onclick="showTab('register')">注册</div>
      </div>
      
      <!-- 登录 -->
      <div id="tab-login">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="login-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="密码">
        </div>
        <button class="btn" onclick="doLogin()">登录</button>
        <p class="error" id="login-error"></p>
      </div>
      
      <!-- 注册 -->
      <div id="tab-register" class="hidden">
        <div class="form-group">
          <label>名字</label>
          <input type="text" id="reg-name" placeholder="您的名字">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="reg-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="reg-password" placeholder="密码 (至少6位)">
        </div>
        <button class="btn" onclick="doRegister()">注册</button>
        <p class="success" id="reg-success"></p>
        <p class="error" id="reg-error"></p>
      </div>
    </div>
    
    <!-- 登录后显示 -->
    <div id="user-panel" class="hidden">
      <div class="user-info">
        <div class="email" id="user-email"></div>
        <div class="role" id="user-role"></div>
      </div>
      <button class="btn" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <script type="module" src="firebase-integration.js"></script>
  <script>
    let currentUser = null;
    let userRole = 'customer';

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        document.querySelector('.tab:first-child').classList.add('active');
        document.getElementById('tab-login').classList.remove('hidden');
        document.getElementById('tab-register').classList.add('hidden');
      } else {
        document.querySelector('.tab:last-child').classList.add('active');
        document.getElementById('tab-login').classList.add('hidden');
        document.getElementById('tab-register').classList.remove('hidden');
      }
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      if (!email || !password) {
        errorEl.textContent = '请填写邮箱和密码';
        errorEl.style.display = 'block';
        return;
      }
      
      const result = await window.login(email, password);
      if (result.success) {
        currentUser = result.user;
        document.getElementById('login-error').style.display = 'none';
        checkLoginStatus();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const errorEl = document.getElementById('reg-error');
      const successEl = document.getElementById('reg-success');
      
      if (!name || !email || !password) {
        errorEl.textContent = '请填写所有信息';
        errorEl.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        errorEl.textContent = '密码至少6位';
        errorEl.style.display = 'block';
        return;
      }
      
      const result = await window.register(email, password, name);
      if (result.success) {
        successEl.textContent = '注册成功，请登录！';
        successEl.style.display = 'block';
        setTimeout(() => showTab('login'), 1500);
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
    }

    async function doLogout() {
      await window.logout();
      currentUser = null;
      userRole = 'customer';
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('user-panel').classList.add('hidden');
    }

    // 检查登录状态（需要根据你的Firebase配置实现）
    function checkLoginStatus() {
      // 这里应该调用 Firebase 检查用户状态
      // 简化版���：
      if (currentUser) {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('user-panel').classList.remove('hidden');
        document.getElementById('user-email').textContent = currentUser.email || document.getElementById('login-email').value;
        
        // 检查是否是管理员（邮箱判断）
        const email = (currentUser.email || document.getElementById('login-email').value).toLowerCase();
        if (email === 'admin@tapingtrading.com' || email === 'admin@tapingtrading.com') {
          userRole = 'admin';
          document.getElementById('user-role').textContent = '👑 管理员';
        } else {
          userRole = 'customer';
          document.getElementById('user-role').textContent = '👤 客户';
        }
      }
    }
  </script>
</body>
</html>
